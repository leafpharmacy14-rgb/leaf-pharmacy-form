<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リーフ薬局 問診票</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="script.js"></script>
  <style>
    
{ box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    background: #f0f8f0;
    color: #333;
    padding: 16px;}.header {
    background: #4caf50;
    color: white;
    text-align: center;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 20px;}.header h1 { font-size: 20px; margin-bottom: 4px; }.card {
    background: white;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);}.card h2 {
    font-size: 15px;
    color: #4caf50;
    border-bottom: 2px solid #e8f5e9;
    padding-bottom: 8px;
    margin-bottom: 12px;}.section-title {
    background: #e8f5e9;
    color: #2e7d32;
    font-size: 14px;
    font-weight: bold;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 12px;}.question { margin-bottom: 16px; }.question > label {
display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .required { color: #e53935; font-size: 12px; margin-left: 4px; }
    input[type="text"],
    input[type="date"],
    input[type="tel"],
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    textarea { height: 80px; resize: vertical; }
    .radio-group, .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .radio-group label, .checkbox-group label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    input[type="radio"], input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 32px;
    }
    #complete-msg {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    #complete-msg h2 { color: #4caf50; font-size: 22px; margin-bottom: 12px; }
    #complete-msg p { color: #555; font-size: 14px; line-height: 1.8; }
  </style>
</head>
<body>

<div id="form-area">

<div class="header">
  <h1>🌿 リーフ薬局</h1>
  <p>問診票</p>
</div>

<div class="card">
  <h2>📋 基本情報</h2>
  <div class="question">
    <label>お名前（フルネーム）<span class="required">※必須</span></label>
    <input type="text" id="name" placeholder="例：田中　太郎">
  </div>
  <div class="question">
    <label>生年月日<span class="required">※必須</span></label>
    <input type="date" id="birthday">
    <div id="age-display" style="margin-top:6px;"></div>
  </div>
  <div class="question">
    <label>年齢区分<span class="required">※必須</span></label>
    <div class="radio-group">
<label><input type="radio" name="age_group" value="15歳以上"> 15歳以上</label>
      <label><input type="radio" name="age_group" value="0〜14歳"> 0〜14歳（小児）</label>
    </div>
  </div>
  <div class="question">
    <label>電話番号</label>
    <input type="tel" id="phone" placeholder="例：090-1234-5678">
  </div>
</div>

<div class="card">
  <div class="section-title">▼ 15歳以上の方はこちらにご記入ください</div>
  <div class="question">
    <label>Q1. 現在、他の医療機関から処方されているお薬はありますか？</label>
    <div class="radio-group">
      <label><input type="radio" name="a_current_med" value="ない"> ない</label>
      <label><input type="radio" name="a_current_med" value="ある"> ある</label>
    </div>
    <textarea id="a_current_med_detail" placeholder="ある場合：薬の名前・服用理由" style="margin-top:8px;"></textarea>
  </div>
  <div class="question">
    <label>Q2. 市販薬・サプリメントを服用していますか？</label>
    <div class="radio-group">
      <label><input type="radio" name="a_otc" value="いいえ"> いいえ</label>
      <label><input type="radio" name="a_otc" value="はい"> はい</label>
    </div>
    <textarea id="a_otc_detail" placeholder="はいの場合：内容" style="margin-top:8px;"></textarea>
  </div>
  <div class="question">
    <label>Q3. 薬や食品でアレルギーがありますか？</label>
    <div class="radio-group">
      <label><input type="radio" name="a_allergy" value="ない"> ない</label>
      <label><input type="radio" name="a_allergy" value="ある"> ある</label>
    </div>
    <textarea id="a_allergy_detail" placeholder="ある場合：内容" style="margin-top:8px;"></textarea>
  </div>
  <div class="question">
    <label>Q4. 過去にお薬で副作用が出たことがありますか？</label>
    <div class="radio-group">
      <label><input type="radio" name="a_sideeffect" value="ない"> ない</label>
      <label><input type="radio" name="a_sideeffect" value="ある"> ある</label>
    </div>
    <textarea id="a_sideeffect_detail" placeholder="ある場合：薬の名前・症状" style="margin-top:8px;"></textarea>
  </div>
  <div class="question">
    <label>Q5. 現在治療中または既往のある病気はありますか？</label>
    <div class="checkbox-group">
<label><input type="checkbox" name="a_disease" value="肝臓病"> 肝臓病</label>
      <label><input type="checkbox" name="a_disease" value="腎臓病"> 腎臓病</label>
      <label><input type="checkbox" name="a_disease" value="心臓病"> 心臓病</label>
      <label><input type="checkbox" name="a_disease" value="糖尿病"> 糖尿病</label>
      <label><input type="checkbox" name="a_disease" value="高血圧"> 高血圧</label>
      <label><input type="checkbox" name="a_disease" value="緑内障"> 緑内障</label>
      <label><input type="checkbox" name="a_disease" value="その他"> その他</label>
    </div>
    <input type="text" id="a_disease_other" placeholder="その他の場合はご記入ください" style="margin-top:8px;">
  </div>
  <div class="question">
    <label>Q6. 妊娠中または授乳中ですか？</label>
    <div class="radio-group">
      <label><input type="radio" name="a_pregnancy" value="いいえ"> いいえ</label>
      <label><input type="radio" name="a_pregnancy" value="妊娠中"> 妊娠中</label>
      <label><input type="radio" name="a_pregnancy" value="授乳中"> 授乳中</label>
    </div>
  </div>
  <div class="question">
    <label>Q7. 喫煙はしていますか？</label>
    <div class="radio-group">
      <label><input type="radio" name="a_smoke" value="しない"> しない</label>
      <label><input type="radio" name="a_smoke" value="する"> する</label>
      <label><input type="radio" name="a_smoke" value="過去にしていた"> 過去にしていた</label>
    </div>
  </div>
  <div class="question">
    <label>Q8. 飲酒はしていますか？</label>
    <div class="radio-group">
      <label><input type="radio" name="a_alcohol" value="しない"> しない</label>
      <label><input type="radio" name="a_alcohol" value="時々する"> 時々する</label>
      <label><input type="radio" name="a_alcohol" value="毎日する"> 毎日する</label>
    </div>
  </div>
  <div class="question">
    <label>Q9. 今回の主な症状・ご相談内容</label>
    <textarea id="a_symptom" placeholder="症状や気になることをご記入ください"></textarea>
  </div>
  <div class="question">
    <label>Q10. ご希望・その他</label>
    <textarea id="a_other" placeholder="ジェネリック希望・一包化希望など"></textarea>
  </div>
</div>

<div class="card">
<div class="section-title">▼ 0〜14歳（小児）の方はこちらにご記入ください</div>
  <div class="question">
    <label>Q1. お子様の体重（kg）</label>
    <input type="text" id="c_weight" placeholder="例：20">
  </div>
  <div class="question">
    <label>Q2. 現在、他院から処方されているお薬はありますか？</label>
    <div class="radio-group">
      <label><input type="radio" name="c_current_med" value="ない"> ない</label>
      <label><input type="radio" name="c_current_med" value="ある"> ある</label>
    </div>
    <textarea id="c_current_med_detail" placeholder="ある場合：薬の名前・服用理由" style="margin-top:8px;"></textarea>
  </div>
  <div class="question">
    <label>Q3. 薬や食品でアレルギーがありますか？</label>
    <div class="radio-group">
      <label><input type="radio" name="c_allergy" value="ない"> ない</label>
      <label><input type="radio" name="c_allergy" value="ある"> ある</label>
    </div>
    <textarea id="c_allergy_detail" placeholder="ある場合：内容" style="margin-top:8px;"></textarea>
  </div>
  <div class="question">
    <label>Q4. 過去にお薬で副作用が出たことがありますか？</label>
    <div class="radio-group">
      <label><input type="radio" name="c_sideeffect" value="ない"> ない</label>
      <label><input type="radio" name="c_sideeffect" value="ある"> ある</label>
    </div>
    <textarea id="c_sideeffect_detail" placeholder="ある場合：薬の名前・症状" style="margin-top:8px;"></textarea>
  </div>
  <div class="question">
    <label>Q5. かかりつけの医療機関はありますか？</label>
    <div class="radio-group">
      <label><input type="radio" name="c_clinic" value="ない"> ない</label>
      <label><input type="radio" name="c_clinic" value="ある"> ある</label>
    </div>
    <input type="text" id="c_clinic_name" placeholder="ある場合：医療機関名" style="margin-top:8px;">
  </div>
  <div class="question">
    <label>Q6. 今回の主な症状</label>
    <textarea id="c_symptom" placeholder="症状をご記入ください"></textarea>
  </div>
  <div class="question">
    <label>Q7. 保護者のお名前<span class="required">※必須</span></label>
    <input type="text" id="c_guardian" placeholder="例：田中　花子">
  </div>
  <div class="question">
    <label>Q8. ご希望・その他</label>
<textarea id="c_other" placeholder="ご自由にお書きください"></textarea>
  </div>
</div>

<button class="submit-btn" id="submit-btn" type="button">送信する</button>

</div>

<div id="complete-msg">
  <h2>✅ 送信完了</h2>
  <p>問診票を受け付けました。<br>LINEにも送信内容が届きます。<br><br>そのままお待ちください。</p>
</div>

</body>
</html>
